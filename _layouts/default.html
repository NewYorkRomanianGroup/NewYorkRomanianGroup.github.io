<!DOCTYPE html>
<!--
  COLLABORATOR NOTE
  - This is the base layout for all pages.
  - Use | relative_url for internal links so branch previews work.
  - assets/style.css should load before content renders.
  - assets/site.js loads at the end so the DOM exists when JS runs.
  - The favicon uses assets/icon.png.
-->
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="{{ '/assets/icon.png' | relative_url }}">
  <meta charset="utf-8" />

  {% seo %}

  <!-- Responsive layout -->
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  
  <!-- This is to be able to review SEO data - DO NOT REMOVE -->
  <meta name="google-site-verification" content="mepvYxQ77zzETrGGSjPnQcM0AUbqsCt8QRsycscUBPc" />

  <!-- Main site styles -->
  <link rel="stylesheet" href="{{ '/assets/style.css' | relative_url }}" />
</head>

<body>
  {% include header.html %}

  <main class="container">
    {{ content }}
  </main>

  {% include footer.html %}

  <!-- Scripts -->
  <script src="{{ '/assets/site.js' | relative_url }}"></script>
  <script>
    // Auto-update footer year
    var el = document.getElementById("year");
    if (el) el.textContent = new Date().getFullYear();
  </script>
</body>
</html>
