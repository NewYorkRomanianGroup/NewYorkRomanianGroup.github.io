<!--
  COLLABORATOR NOTE
  - This file is included on every page.
  - Keep nav href values using | relative_url so branch previews work.
  - If you add a new page, add a new <a> link here and ensure the page has
    front matter like: ---\nlayout: default\ntitle: ...\n---
  - The logo src MUST use | relative_url (no hard-coded /assets/...) so previews work.
-->

<!-- =========================
     SITE HEADER / NAVIGATION
     Shared across all pages
     ========================= -->
<header>
  <div class="flag-strip" aria-hidden="true"></div>

  <div class="container nav">
    <div class="brand">
      <img src="{{ '/assets/icon.png' | relative_url }}" class="brand-logo" alt="NYRG logo">
      <div>
        <div>New York Romanian Group</div>
        <div class="small">Community • Events • Mentorship</div>
      </div>
    </div>

    <nav class="navlinks" aria-label="Main navigation">
      <a href="{{ '/' | relative_url }}" class="{% if page.url == '/' %}active{% endif %}">Home</a>
      <a href="{{ '/gallery.html' | relative_url }}" class="{% if page.url contains 'gallery' %}active{% endif %}">Gallery</a>
      <a href="{{ '/jobs.html' | relative_url }}" class="{% if page.url contains 'jobs' %}active{% endif %}">Job Postings</a>
      <a href="{{ '/mentorship.html' | relative_url }}" class="{% if page.url contains 'mentorship' %}active{% endif %}">Mentorship</a>
    </nav>
  </div>
</header>
